{{ define "main" }}
<main>
  <article>
    <header>
      <h1>{{ .Title }}</h1>
      {{ if .Params.date }}
        <time datetime="{{ .Params.date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Params.date.Format "January 2, 2006" }}</time>
      {{ end }}
    </header>

    {{ .Content }}
  </article>
</main>
{{ end }}
